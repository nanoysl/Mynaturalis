<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW: ARCHITECTURAL GENESIS</title>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      /* Technische Monospace Typografie */
      .text-cad {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      /* Klassische Serif für das Finale */
      .text-genesis {
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
        font-size: clamp(3rem, 10vw, 10rem);
        line-height: 0.9;
        font-weight: 300;
        letter-spacing: -0.02em;
      }
    }

    body {
      background-color: #050505; /* Fast Schwarz für besseren Kontrast */
      color: #fff;
      overflow-x: hidden;
    }

    /* Das Raster im Hintergrund für den CAD-Look */
    .cad-grid {
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }

    /* Der leuchtende Scanner */
    .scanner-beam {
      box-shadow: 0 0 20px 2px rgba(255, 255, 255, 0.8), 0 0 40px 5px rgba(255, 255, 255, 0.3);
    }

    .will-change-transform {
      will-change: transform, opacity, clip-path;
    }
  </style>
</head>
<body class="antialiased">

  <div class="h-screen flex items-center justify-center text-stone-600 uppercase tracking-[0.3em] text-xs">
    Initiating blueprint render...
  </div>

  <div id="genesis-flow-container" class="relative w-full h-screen bg-[#050505] overflow-hidden flex cursor-crosshair">
    
    <div id="cad-ui" class="absolute inset-0 z-20 pointer-events-none cad-grid">
      <div class="absolute top-8 left-8 text-cad text-stone-500">
        <span id="coord-x">X: 0.000</span><br>
        <span id="coord-y">Y: 0.000</span>
      </div>
      <div class="absolute bottom-8 right-8 text-cad text-stone-500 text-right">
        RENDER: 16-BIT FLOAT<br>
        MAT: CONCRETE / GLASS
      </div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 border border-stone-700 rounded-full flex items-center justify-center opacity-50">
        <div class="w-1 h-1 bg-stone-500 rounded-full"></div>
      </div>
    </div>

    <div id="svg-layer" class="absolute inset-0 z-30 flex items-center justify-center pointer-events-none opacity-100">
      <svg class="w-full h-full max-w-4xl" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="0.2">
        <path class="wireframe-path" d="M50 15 L85 35 L85 75 L50 95 L15 75 L15 35 Z" />
        <path class="wireframe-path" d="M50 15 L50 55 M15 35 L50 55 M85 35 L50 55" />
        <path class="wireframe-path" d="M50 55 L50 95" />
        <path class="wireframe-path" d="M32.5 25 L67.5 45 L67.5 85 L32.5 65 Z" stroke-dasharray="1 1" />
      </svg>
    </div>

    <div id="photo-layer" class="absolute inset-0 z-10 will-change-transform" style="clip-path: inset(0% 0% 100% 0%);">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2000&auto=format&fit=crop" 
           alt="Materialized Architecture" 
           class="w-full h-full object-cover grayscale opacity-0 transition-all duration-1000"
           id="master-photo">
      <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black opacity-80"></div>
    </div>

    <div id="scanner" class="absolute top-0 left-0 w-full h-[2px] bg-white z-40 scanner-beam opacity-0 will-change-transform translate-y-0"></div>

    <div id="genesis-text" class="absolute inset-0 z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none">
      <span class="text-xs tracking-[0.4em] uppercase text-stone-300 mb-6 block">The Space</span>
      <h2 class="text-genesis text-white text-center">Constructed<br>Silence.</h2>
    </div>

  </div>
  <div class="h-[150vh] flex items-center justify-center text-stone-600 uppercase tracking-[0.3em] text-xs border-t border-stone-900 bg-[#050505]">
    End of simulation
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      gsap.registerPlugin(ScrollTrigger);

      // --- SVG Path Setup (Natives DrawSVG Fallback) ---
      // Berechnet die exakte Länge jedes SVG-Pfades und setzt die CSS-Werte auf "verborgen"
      const paths = document.querySelectorAll('.wireframe-path');
      paths.forEach(path => {
        const length = path.getTotalLength();
        path.style.strokeDasharray = length;
        path.style.strokeDashoffset = length;
      });

      // Elemente abgreifen
      const container = document.getElementById('genesis-flow-container');
      const cadUI = document.getElementById('cad-ui');
      const svgLayer = document.getElementById('svg-layer');
      const photoLayer = document.getElementById('photo-layer');
      const masterPhoto = document.getElementById('master-photo');
      const scanner = document.getElementById('scanner');
      const finalTxt = document.getElementById('genesis-text');
      const coordX = document.getElementById('coord-x');
      const coordY = document.getElementById('coord-y');

      // Fake-Koordinaten Updater während des Scrollens
      const updateCoordinates = (progress) => {
        const x = (progress * 144.234).toFixed(3);
        const y = (Math.sin(progress * Math.PI) * 89.102).toFixed(3);
        coordX.innerText = `X: ${x}`;
        coordY.innerText = `Y: ${y}`;
      };

      // Master Timeline (Gepinnt für lange Scroll-Dauer)
      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: container,
          start: "top top",
          end: "+=400%", // 4 Viewports scrollen für den gesamten Effekt
          scrub: 1, // Smoothing von 1 Sekunde für extreme Eleganz
          pin: true,
          onUpdate: (self) => updateCoordinates(self.progress)
        }
      });

      /* =========================================================
         DIE CHOREOGRAFIE
         ========================================================= */

      // 1. THE WIREFRAME (Zeichnen der Linien)
      // Wir animieren den strokeDashoffset auf 0
      paths.forEach(path => {
        tl.to(path, { strokeDashoffset: 0, duration: 1, ease: "power1.inOut" }, 0);
      });

      // 2. THE SCANNER APPEARS
      tl.to(scanner, { opacity: 1, duration: 0.2 }, 1);
      
      // Das Foto wird sichtbar (damit der Clip-Path greifen kann)
      tl.set(masterPhoto, { opacity: 1 }, 1);

      // 3. THE MATERIALIZATION (Clip-Path & Scanner bewegen sich synchron nach unten)
      // Das "inset" zieht die untere Kante (100%) auf 0% auf.
      tl.to(photoLayer, { 
        clipPath: "inset(0% 0% 0% 0%)", 
        ease: "none", 
        duration: 2 
      }, 1.2);
      
      // Der Scanner fährt parallel von top: 0% auf top: 100%
      tl.fromTo(scanner, 
        { top: "0%" }, 
        { top: "100%", ease: "none", duration: 2 }, 
        1.2
      );

      // 4. ATMOSPHERE RISING (Das Foto bekommt Farbe, die CAD-Elemente sterben)
      tl.to(masterPhoto, { filter: "grayscale(0%) brightness(1.2)", duration: 1.5, ease: "power2.out" }, 2.5);
      tl.to(cadUI, { opacity: 0, duration: 0.5 }, 2.8);
      tl.to(svgLayer, { opacity: 0, duration: 0.5 }, 2.8);
      tl.to(scanner, { opacity: 0, duration: 0.2 }, 3.1);

      // 5. THE REVEAL (Finaler Text schiebt sich majestätisch rein)
      tl.to(finalTxt, { opacity: 1, duration: 1, ease: "power3.out" }, 3.0);
      
      // Feiner Parallax-Zoom auf das fertige Bild im letzten Scroll-Prozent
      tl.to(masterPhoto, { scale: 1.05, duration: 1, ease: "none" }, 3.0);

    });
  </script>
</body>
</html>
