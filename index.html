<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW: KINETIC CHOREOGRAPHY</title>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      /* Brutalistische Typografie für die Aktionen */
      .text-action {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: clamp(3rem, 8vw, 8rem);
        line-height: 0.9;
        text-transform: uppercase;
        font-weight: 700;
      }
      
      /* Outline-Text für den unfertigen State */
      .text-stroke {
        -webkit-text-fill-color: transparent;
        -webkit-text-stroke-width: 1px;
        -webkit-text-stroke-color: #57534e; /* stone-600 */
      }
      .text-stroke-active {
        -webkit-text-fill-color: #fafaf9; /* stone-50 */
        -webkit-text-stroke-width: 0;
      }
    }

    body {
      background-color: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* Hardware Acceleration für die Hard-Cuts */
    .frame-img {
      will-change: opacity, transform;
      opacity: 0; /* Versteckt am Anfang */
    }
  </style>
</head>
<body class="antialiased">

  <div class="h-screen flex flex-col items-center justify-center text-stone-600 uppercase tracking-[0.3em] text-xs">
    <span>Prepare for service</span>
    <span class="mt-4 opacity-50">Scroll down</span>
  </div>

  <div id="choreo-flow-container" class="relative w-full h-screen bg-black overflow-hidden flex cursor-crosshair">
    
    <div class="w-full md:w-1/2 h-full flex flex-col justify-center px-8 md:px-16 z-20 relative mix-blend-difference pointer-events-none">
      
      <div id="tension-timer" class="absolute top-1/4 left-8 md:left-16 text-stone-500 font-mono text-sm tracking-widest">
        T-MINUS: <span id="timer-ms">00:00:00</span>
      </div>

      <div class="relative w-full h-32 flex items-center">
        <h2 class="choreo-text absolute text-action text-stroke" data-index="0">Tension</h2>
        <h2 class="choreo-text absolute text-action text-stroke" data-index="1">Scalpel</h2>
        <h2 class="choreo-text absolute text-action text-stroke" data-index="2">Extract</h2>
        <h2 class="choreo-text absolute text-action text-stroke" data-index="3">Fire</h2>
        <h2 class="choreo-text absolute text-action text-stroke" data-index="4">Plating</h2>
      </div>

      <div id="choreo-progress" class="absolute bottom-1/4 left-8 md:left-16 w-0 h-[1px] bg-white"></div>
    </div>

    <div class="absolute inset-0 md:relative md:w-1/2 h-full z-10 bg-black">
      <div class="relative w-full h-full overflow-hidden">
        
        <img src="https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?q=80&w=1200&auto=format&fit=crop" 
             class="frame-img absolute inset-0 w-full h-full object-cover grayscale brightness-50 contrast-125" alt="Frame 1" style="opacity: 1;">
             
        <img src="https://images.unsplash.com/photo-1590004953392-5aba2e72269a?q=80&w=1200&auto=format&fit=crop" 
             class="frame-img absolute inset-0 w-full h-full object-cover grayscale brightness-50 contrast-125" alt="Frame 2">
             
        <img src="https://images.unsplash.com/photo-1559737558-2f5a35f4523b?q=80&w=1200&auto=format&fit=crop" 
             class="frame-img absolute inset-0 w-full h-full object-cover grayscale brightness-50 contrast-125" alt="Frame 3">
             
        <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1200&auto=format&fit=crop" 
             class="frame-img absolute inset-0 w-full h-full object-cover grayscale brightness-75 contrast-150" alt="Frame 4">
             
        <img src="https://images.unsplash.com/photo-1581184953963-d15972933db1?q=80&w=1200&auto=format&fit=crop" 
             class="frame-img absolute inset-0 w-full h-full object-cover grayscale brightness-50 contrast-125" alt="Frame 5">
             
      </div>
    </div>

    <div id="flashbang" class="absolute top-1/2 right-1/4 w-4 h-4 bg-white rounded-full z-50 pointer-events-none scale-0 opacity-0 flex items-center justify-center overflow-hidden">
      <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=2000&auto=format&fit=crop" 
           id="final-masterpiece"
           class="absolute inset-0 w-screen h-screen object-cover opacity-0 object-center" 
           style="max-width: none; width: 100vw; height: 100vh;" 
           alt="The Masterpiece">
      
      <div id="final-text" class="absolute z-10 bottom-16 left-16 text-stone-900 opacity-0">
        <span class="text-xs tracking-[0.4em] uppercase font-bold">The Result</span>
        <h3 class="text-4xl font-light mt-2">Surgical Perfection.</h3>
      </div>
    </div>

  </div>
  <div class="h-screen flex items-center justify-center text-stone-400 uppercase tracking-[0.3em] text-xs bg-stone-100 border-t border-stone-200">
    Resume normal breathing
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      gsap.registerPlugin(ScrollTrigger);

      // --- Timer Logic (Act 1 Tension) ---
      const timerEl = document.getElementById('timer-ms');
      let startTime = Date.now();
      let timerInterval = setInterval(() => {
        let diff = Date.now() - startTime;
        let ms = String(diff % 1000).padStart(3, '0');
        let sec = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
        let min = String(Math.floor((diff / 60000) % 60)).padStart(2, '0');
        timerEl.innerText = `${min}:${sec}:${ms}`;
      }, 47); // Weird interval for faster visual updating

      // --- GSAP Choreography ---
      const container = document.getElementById('choreo-flow-container');
      const texts = gsap.utils.toArray('.choreo-text');
      const frames = gsap.utils.toArray('.frame-img');
      const progressBar = document.getElementById('choreo-progress');
      
      const flashbang = document.getElementById('flashbang');
      const finalImage = document.getElementById('final-masterpiece');
      const finalText = document.getElementById('final-text');

      // Initiales Setup für die Texte (alle bis auf den ersten verstecken/runtersetzen)
      gsap.set(texts, { y: 50, opacity: 0 });
      gsap.set(texts[0], { y: 0, opacity: 1, className: "choreo-text absolute text-action text-stroke-active" });

      // Master Timeline, gepinnt für 400% Viewport-Höhe (Stop-Motion Scrubbing)
      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: container,
          start: "top top",
          end: "+=400%",
          scrub: true,
          pin: true,
          onEnter: () => clearInterval(timerInterval), // Timer stoppen, wenn es losgeht
          onLeaveBack: () => {
             // Timer wieder starten, wenn man zurück nach oben scrollt
             startTime = Date.now();
             timerInterval = setInterval(() => {
                let diff = Date.now() - startTime;
                let ms = String(diff % 1000).padStart(3, '0');
                let sec = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
                timerEl.innerText = `00:${sec}:${ms}`;
             }, 47);
          }
        }
      });

      // Progress Bar animieren
      tl.to(progressBar, { width: "100vw", ease: "none", duration: texts.length }, 0);

      // Loop durch die Frames, um harte Schnitte zu erzeugen
      texts.forEach((text, i) => {
        if (i === 0) return; // Den ersten Frame haben wir schon beim Start
        
        // Die Zeitachse (0 bis Anzahl der Frames)
        const startTime = i;
        
        // 1. Alter Text geht weg (Wird zum Stroke, wandert nach oben)
        tl.to(texts[i - 1], { 
          y: -50, 
          opacity: 0, 
          className: "choreo-text absolute text-action text-stroke",
          duration: 0.1 
        }, startTime - 0.1);

        // 2. Neuer Text kommt rein (Aktiviert, in die Mitte)
        tl.to(text, { 
          y: 0, 
          opacity: 1, 
          className: "choreo-text absolute text-action text-stroke-active",
          duration: 0.1 
        }, startTime);

        // 3. Bild Hard Cut: Altes Bild verstecken, neues sofort zeigen
        // "steps(1)" sorgt dafür, dass keine Überblendung stattfindet, sondern ein harter Schnitt
        tl.set(frames[i - 1], { opacity: 0 }, startTime);
        tl.set(frames[i], { opacity: 1 }, startTime);
        
        // Simulierter "Camera Shake" beim Cut (Aggressivität)
        tl.fromTo(frames[i], 
          { scale: 1.05, filter: "brightness(2)" }, 
          { scale: 1, filter: "brightness(0.5)", duration: 0.8, ease: "power4.out" }, 
          startTime
        );
      });

      // --- ACT 3: THE FLASHBANG ---
      // Nach der Stop-Motion Sequenz explodiert der Flashbang
      const exitTime = texts.length + 0.5;

      tl.to(flashbang, {
        opacity: 1,
        scale: 250, // Massiv hochskalieren, um den Bildschirm zu füllen
        duration: 1.5,
        ease: "expo.in"
      }, exitTime)
      // Finales Bild einblenden (Gleicht die Verzerrung des scalings aus)
      .to(finalImage, {
        opacity: 1,
        duration: 0.1
      }, exitTime + 1)
      // Text einblenden
      .to(finalText, {
        opacity: 1,
        y: -20,
        duration: 0.5,
        ease: "power2.out"
      }, exitTime + 1.2);

    });
  </script>
</body>
</html>
